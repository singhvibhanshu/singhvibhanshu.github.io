<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 | Vibhanshu Singh</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="favicon.png">

<style>
body {
    background-color: #1c1c1c;
    color: #d7d7d7;
    font-family: 'Cutive Mono', monospace;
    font-size: 16.2px;
    letter-spacing: 0.5px;
    line-height: 1.5;
    margin: 0;
    padding: 2rem;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

body::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.3),
        rgba(0,0,0,0.3) 1px,
        transparent 1px,
        transparent 2px
    );
    pointer-events: none;
    z-index: 1000;
}

.box {
    max-width: 640px;
    width: 100%;
    text-align: center;
}

.code {
    font-size: 5rem;
    margin: 0;
    font-weight: normal;
    color: #f0f0f0;
}

.msg {
    color: #a8a8a8;
    margin: 0.5rem 0 2rem 0;
}

@media (max-width: 600px) {
    body { padding: 1rem; }
    .code { font-size: 3.5rem; }
}
</style>

</head>

<body>

<div class="box">

<h1 class="code">404</h1>

<p class="msg">this page doesn't exist.</p>

</div>

</body>
</html>
